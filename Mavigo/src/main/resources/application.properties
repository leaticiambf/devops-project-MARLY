# -- App
spring.application.name=Mavigo
spring.config.import=optional:file:local.env[.properties]

app.frontend.base-url=${APP_FRONTEND_BASE_URL:http://localhost:3000}
app.frontend.allowed-origins=${APP_FRONTEND_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173}
app.oauth.redirect-base-url=${APP_OAUTH_REDIRECT_BASE_URL:http://localhost:3000}

# -- Server
server.port=8080
server.forward-headers-strategy=framework

# -- Database (H2 en mode compat Postgres)
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/mavigo;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER_CLASS_NAME:org.h2.Driver}
spring.jpa.properties.hibernate.dialect=${JPA_HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}

spring.h2.console.enabled=${APP_H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# -- Monitoring
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

PRIM_API_KEY=${PRIM_API_KEY}

# -- OAuth2 Google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.google.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.google.redirect-uri=${app.oauth.redirect-base-url}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.google.scope=openid,profile,email,https://www.googleapis.com/auth/tasks

spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://openidconnect.googleapis.com/v1/userinfo
spring.security.oauth2.client.provider.google.jwk-set-uri=https://www.googleapis.com/oauth2/v3/certs
spring.security.oauth2.client.provider.google.user-name-attribute=sub

logging.level.org.springframework.security=${LOG_LEVEL_SPRING_SECURITY:INFO}
logging.level.org.springframework.web.reactive.function.client=${LOG_LEVEL_WEBCLIENT:WARN}
logging.level.reactor.netty.http.client=${LOG_LEVEL_REACTOR_NETTY:WARN}

# -- Geocoding (BAN)
geocoding.ban.base-url=https://api-adresse.data.gouv.fr
tourism.yelp.base-url=${TOURISM_YELP_BASE_URL:https://api.yelp.com/v3}
tourism.yelp.api-key=${TOURISM_YELP_API_KEY:}

server.error.include-message=always
server.error.include-exception=true
server.error.include-binding-errors=always

app.secret-key=${JWT_SECRET}
app.expiration-time=${JWT_EXPIRATION:86400000}

mavigo.jwt.secret=${JWT_SECRET}
